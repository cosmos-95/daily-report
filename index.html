<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鍏ㄧ悆瑕侀椈鏃ユ姤 路 绱㈠紩</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Noto+Serif+SC:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-top: #0F1520; --bg-mid: #0B0F1A; --bg-bottom: #0A0E17;
  --card-bg: #111827;
  --card-border: rgba(255,255,255,0.06);
  --card-border-hover: rgba(255,255,255,0.10);
  --text-primary: #E5E7EB; --text-secondary: #9CA3AF; --text-tertiary: #6B7280;
  --accent-blue: #3B82F6; --accent-cyan: #14B8A6; --accent-green: #10B981;
  --accent-amber: #F59E0B; --accent-red: #EF4444; --source-green: #059669;
  --bg-info: #1E3A8A; --bg-success: #064E3B; --bg-warning: #78350F; --bg-danger: #7F1D1D;
  --radius-sm: 6px; --radius-md: 10px; --radius-lg: 14px; --radius-full: 999px;
  --font-body: "IBM Plex Sans", ui-sans-serif, system-ui, -apple-system, sans-serif;
  --font-mono: "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
  --font-display: "Noto Serif SC", ui-serif, Georgia, serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:var(--font-body);
  background:linear-gradient(180deg,var(--bg-top) 0%,var(--bg-mid) 50%,var(--bg-bottom) 100%);
  color:var(--text-primary);line-height:1.6;min-height:100vh;
}
.container{max-width:780px;margin:0 auto;padding:48px 24px}
.header{text-align:center;padding:20px 0 36px;margin-bottom:32px;border-bottom:1px solid var(--card-border)}
.header h1{font-family:var(--font-display);font-size:30px;font-weight:700;color:#FFF;margin-bottom:4px}
.header .sub{font-size:13px;color:var(--text-secondary);font-weight:400;letter-spacing:.8px}
.header .date-badge{display:inline-block;margin-top:18px;padding:6px 16px;background:var(--bg-info);border:1px solid #2563EB;border-radius:var(--radius-full);font-size:13px;font-weight:500;color:var(--accent-blue)}
.stats-row{display:flex;gap:12px;margin-bottom:24px}
.stat-card{flex:1;background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius-md);padding:16px 18px;text-align:center;box-shadow:0 4px 6px -1px rgba(0,0,0,.3),0 2px 4px -1px rgba(0,0,0,.2);transition:box-shadow .2s,transform .2s,border-color .2s}
.stat-card:hover{box-shadow:0 10px 15px -3px rgba(0,0,0,.5);transform:translateY(-1px);border-color:var(--card-border-hover)}
.stat-card .num{font-family:var(--font-mono);font-size:24px;font-weight:500;margin-bottom:2px;line-height:1}
.stat-card .label{font-size:11px;color:var(--text-secondary);font-weight:500;letter-spacing:.3px;text-transform:uppercase}
.stat-card.red .num{color:var(--accent-red)}.stat-card.blue .num{color:var(--accent-blue)}
.filter-section{margin-bottom:24px}
.filter-title{font-family:var(--font-display);font-size:15px;font-weight:700;color:#D1D5DB;padding:10px 0 10px 14px;border-left:3px solid var(--accent-cyan);border-bottom:1px solid var(--card-border);margin-bottom:14px}
.filter-options{display:flex;gap:8px;flex-wrap:wrap}
.filter-btn{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius-full);padding:5px 14px;font-size:12px;color:var(--text-secondary);cursor:pointer;transition:all .2s;font-weight:500}
.filter-btn:hover{border-color:var(--accent-cyan);color:var(--accent-cyan)}
.filter-btn.active{background:var(--bg-info);border-color:#2563EB;color:var(--accent-blue)}
.reports-section{margin-bottom:32px}
.reports-title{font-family:var(--font-display);font-size:17px;font-weight:700;color:#D1D5DB;padding:10px 0 10px 14px;border-left:3px solid var(--accent-cyan);border-bottom:1px solid var(--card-border);margin-bottom:14px}
.report-list{display:grid;gap:10px}
.report-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius-md);padding:18px 22px;transition:border-color .2s,box-shadow .2s;text-decoration:none;color:inherit;display:block;box-shadow:0 4px 6px -1px rgba(0,0,0,.2),0 2px 4px -1px rgba(0,0,0,.15)}
.report-card:hover{border-color:var(--card-border-hover);box-shadow:0 10px 15px -3px rgba(0,0,0,.4)}
.report-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.report-date{font-size:15px;font-weight:600;color:var(--accent-cyan)}
.report-tag{font-size:11px;padding:3px 10px;border-radius:var(--radius-full);font-weight:500;background:var(--bg-info);color:var(--accent-blue);border:1px solid #2563EB}
.report-summary{font-size:13px;color:var(--text-secondary);line-height:1.6;margin-bottom:10px}
.report-meta{display:flex;gap:14px;font-size:11px;color:var(--text-tertiary)}
.report-meta span{display:flex;align-items:center;gap:4px}
.footer{text-align:center;padding:28px 0;margin-top:36px;border-top:1px solid var(--card-border);font-size:12px;color:var(--text-tertiary)}
.footer p{margin:4px 0;line-height:1.5}
.footer .disclaimer{margin-top:12px;padding:10px 18px;background:rgba(255,255,255,.03);border-radius:var(--radius-sm);font-size:11px;color:var(--text-tertiary);border:1px solid var(--card-border)}
@media(max-width:640px){.container{padding:32px 16px}.stats-row{flex-direction:column;gap:8px}.report-card{padding:14px 16px}.header h1{font-size:24px}}
@media(max-width:480px){.container{padding:24px 12px}.header h1{font-size:20px}.stat-card .num{font-size:20px}}
</style>
</head>
<body>
<div class="container">
<div class="header">
  <h1>鍏ㄧ悆瑕侀椈鏃ユ姤</h1>
  <div class="sub">姣忔棩绮鹃€?路 鑱氱劍AI 路 鐧借瘽瑙ｈ</div>
  <div class="date-badge">绱㈠紩椤?路 鎸夋棩鏈熸煡鐪嬪巻鍙叉姤鍛?/div>
</div>
<div class="stats-row">
  <div class="stat-card red"><div class="num" id="total-reports">1</div><div class="label">鍘嗗彶鎶ュ憡鎬绘暟</div></div>
  <div class="stat-card blue"><div class="num" id="latest-date">2026-05-27</div><div class="label">鏈€鏂版姤鍛婃棩鏈?/div></div>
</div>
<div class="filter-section">
  <div class="filter-title">绛涢€?/div>
  <div class="filter-options">
    <button class="filter-btn active" onclick="filterReports('all')">鍏ㄩ儴鎶ュ憡</button>
    <button class="filter-btn" onclick="filterReports('week')">鏈€杩戜竴鍛?/button>
    <button class="filter-btn" onclick="filterReports('month')">鏈€杩戜竴鏈?/button>
    <button class="filter-btn" onclick="filterReports('ai')">AI涓撻</button>
  </div>
</div>
<div class="reports-section">
  <div class="reports-title">鍘嗗彶鎶ュ憡</div>
  <div class="report-list" id="report-list"></div>
</div>
<div class="footer">
  <p>鍏ㄧ悆瑕侀椈鏃ユ姤 路 鑷姩鐢熸垚 路 姣忔棩鏇存柊</p>
  <p>鐐瑰嚮鎶ュ憡鍗＄墖鍗冲彲鏌ョ湅褰撴棩瀹屾暣鍐呭</p>
  <div class="disclaimer">鏈储寮曢〉鑷姩鏇存柊锛屾瘡澶╀笂鍗?鐐硅嚜鍔ㄦ坊鍔犳柊鎶ュ憡銆?/div>
</div>
</div>
<script>
const reports=[{date:"2026骞?鏈?8鏃?,weekday:"鍛ㄥ洓",filename:"daily_report_20260528.html",summary:"浼婄編鍋滅伀妗嗘灦鏇濆厜娌逛环鏆磋穼5.5%锛涜涓婂伐涓氬埄娑﹀18.2%锛涜嫳浼熻揪鐮?500浜跨編鍏冩姇璧勫彴婀捐姱鐗囷紱骞村害绔嬫硶璁″垝鍙戝竷灏嗗埗瀹氶噾铻嶆硶銆佸尰鐤椾繚闅滄硶",highCount:6,midCount:15,lowCount:0,tags:["ai"]},{date:"2026骞?鏈?7鏃?,weekday:"鍛ㄤ笁",filename:"daily_report_20260527.html",summary:"DeepSeek V4 Pro 姘镐箙闄嶄环75%寮曠垎鍏ㄧ悆澶фā鍨嬩环鏍兼垬锛涚編鍏夌鎶€甯傚€肩獊鐮?涓囦嚎缇庡厓锛汫oogle I/O 2026鍙戝竷AI鍏ㄥ妗讹紱鍗庝负瀹ｇО2031骞村彲鑷爺1.4nm鑺墖...",highCount:8,midCount:8,lowCount:6,tags:["ai"]}];
document.getElementById('total-reports').textContent=reports.length;
document.getElementById('latest-date').textContent=reports[0].date.replace('骞?,'-').replace('鏈?,'-').replace('鏃?,'');
function renderReports(filter='all'){let f=[...reports];if(filter==='week')f=reports.slice(0,Math.min(7,reports.length));else if(filter==='month')f=reports.slice(0,Math.min(30,reports.length));else if(filter==='ai')f=reports.filter(r=>r.tags.includes('ai'));document.getElementById('report-list').innerHTML=f.map(r=>'<a href="'+r.filename+'" class="report-card"><div class="report-header"><div class="report-date">'+r.date+' 路 '+r.weekday+'</div><div class="report-tag">'+(r.tags.includes('ai')?'AI涓撻':'缁煎悎')+'</div></div><div class="report-summary">'+r.summary+'</div><div class="report-meta"><span>楂樺奖鍝嶅姏浜嬩欢: '+r.highCount+'</span><span>涓奖鍝嶅姏浜嬩欢: '+r.midCount+'</span><span>浣庡奖鍝嶅姏浜嬩欢: '+r.lowCount+'</span></div></a>').join('')}
function filterReports(type){document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');renderReports(type)}
renderReports('all');
</script>
</body>
</html>
