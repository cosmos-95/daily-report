<style>
:root {
  --bg-top:#0F1520; --bg-mid:#0B0F1A; --bg-bottom:#0A0E17;
  --card-bg:#111827; --card-border:rgba(255,255,255,0.06);
  --text-primary:#E5E7EB; --text-secondary:#9CA3AF;
  --accent-cyan:#14B8A6; --accent-blue:#3B82F6; --accent-green:#10B981; --accent-amber:#F59E0B; --accent-red:#EF4444; --accent-purple:#A855F7;
  --bg-info:#1E3A8A; --bg-success:#064E3B; --bg-warning:#78350F; --bg-danger:#7F1D1D;
  --radius-sm:6px; --radius-md:10px; --radius-lg:14px; --radius-full:999px;
  --font-body:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif;
  --font-mono:ui-monospace,"SF Mono","Cascadia Code",Menlo,Consolas,monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-body);background:linear-gradient(180deg,var(--bg-top) 0%,var(--bg-mid) 60%,var(--bg-bottom) 100%);color:var(--text-primary);line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased}
.container{max-width:820px;margin:0 auto;padding:32px 20px 80px}

/* Header */
.header{text-align:center;padding:20px 0 28px;border-bottom:1px solid var(--card-border);margin-bottom:24px}
.header h1{font-size:28px;font-weight:700;color:#FFF;margin-bottom:6px}
.header .sub{font-size:13px;color:var(--text-secondary)}
.header .date-badge{display:inline-block;margin-top:14px;padding:5px 18px;background:rgba(30,58,138,.5);border:1px solid rgba(59,130,246,.3);border-radius:var(--radius-full);font-size:13px;color:#FFF}

/* Global Controls */
.global-controls{display:flex;align-items:center;gap:12px;padding:14px 20px;background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius-md);margin-bottom:24px;flex-wrap:wrap}
.global-controls .info{flex:1;font-size:13px;color:var(--text-secondary);min-width:120px}
.global-controls .info strong{color:#D1D5DB}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border:none;border-radius:var(--radius-full);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;font-family:var(--font-body)}
.btn-primary{background:var(--accent-cyan);color:#0F1520}
.btn-primary:hover{background:#0D9488;transform:translateY(-1px);box-shadow:0 4px 12px rgba(20,184,166,.3)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.btn-secondary{background:#1E293B;color:#D1D5DB;border:1px solid var(--card-border)}
.btn-secondary:hover{background:#334155;border-color:rgba(255,255,255,.15)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-danger{background:var(--bg-danger);color:#F87171}
.btn-danger:hover{background:#991B1B;color:#FCA5A5}
.progress-bar{flex:1;min-width:120px;height:4px;background:#1E293B;border-radius:2px;overflow:hidden}
.progress-bar .fill{height:100%;background:linear-gradient(90deg,var(--accent-cyan),var(--accent-blue));border-radius:2px;transition:width .15s;width:0}
.progress-label{font-size:11px;color:var(--text-secondary);font-family:var(--font-mono);white-space:nowrap}

/* Sections */
.cat-section{margin-bottom:32px}
.cat-heading{font-size:16px;font-weight:700;color:#D1D5DB;padding:8px 0 8px 12px;border-left:3px solid var(--accent-cyan);border-bottom:1px solid var(--card-border);margin-bottom:14px;display:flex;align-items:center;gap:8px}

/* Cards */
.card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius-md);padding:16px 20px;margin-bottom:12px;transition:border-color .2s,box-shadow .2s}
.card:hover{border-color:rgba(255,255,255,.10);box-shadow:0 8px 12px -4px rgba(0,0,0,.4)}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px}
.card-title{font-size:15px;font-weight:600;color:#D1D5DB;flex:1;word-break:break-word}
.card-title a{color:var(--accent-cyan);text-decoration:none}
.card-title a:hover{color:#E5E7EB}
.tags{display:flex;gap:4px;flex-wrap:wrap;flex-shrink:0}
.tag{font-size:10px;padding:2px 8px;border-radius:var(--radius-full);font-weight:500;border:1px solid transparent;white-space:nowrap}
.tag.red{background:var(--bg-danger);color:#F87171;border-color:#DC2626}
.tag.yellow{background:var(--bg-warning);color:var(--accent-amber);border-color:#D97706}
.tag.green{background:var(--bg-success);color:var(--accent-green);border-color:#059669}
.tag.ai{background:var(--bg-info);color:var(--accent-blue);border-color:#2563EB}
.tag.official{background:rgba(59,130,246,.15);color:var(--accent-blue);border-color:rgba(59,130,246,.3)}
.tag.media{background:rgba(16,185,129,.15);color:var(--accent-green);border-color:rgba(16,185,129,.3)}

/* Sentence highlights */
.card-body{font-size:14px;color:#D1D5DB;line-height:1.8}
.card-body .sent{display:inline;padding:1px 2px;border-radius:2px;transition:background .2s,color .2s;cursor:default}
.card-body .sent.active{background:rgba(20,184,166,.35);color:#FFF;font-weight:500}
.card-body .sent.done{color:var(--text-secondary)}
.card-body .sent.pending{color:#9CA3AF}

/* Impact */
.card-impact{background:#1E293B;border-radius:var(--radius-sm);padding:12px 16px;margin-top:10px;font-size:14px;border-left:3px solid var(--accent-cyan);color:#E2E8F0}
.card-impact strong{color:#A7F3D0;font-weight:600}
.card-impact.active-impact{border-color:#5EEAD4!important;box-shadow:0 0 0 1px #5EEAD4,0 0 16px rgba(94,234,212,.2)!important}
.card-advice{margin-top:6px;padding-top:6px;border-top:1px dashed rgba(255,255,255,.08)}
.card-advice strong{color:#FCD34D!important}
.verify-badge{display:inline-block;margin:8px 0 0 14px;padding:2px 8px;border-radius:var(--radius-full);font-size:10px;background:rgba(16,185,129,.08);color:#6EE7B7;border:1px solid rgba(16,185,129,.25)}
.source-line{margin-top:10px;font-size:10px;display:flex;gap:6px;flex-wrap:wrap}
.source-line span{padding:1px 8px;color:#059669;border:1px solid rgba(5,150,105,.2);border-radius:var(--radius-sm);font-family:var(--font-mono);font-size:9px}

/* Card controls */
.card-controls{display:flex;align-items:center;gap:8px;margin-top:12px;padding-top:10px;border-top:1px solid rgba(255,255,255,.06)}
.card-play-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--accent-cyan);background:rgba(20,184,166,.1);color:var(--accent-cyan);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s;flex-shrink:0}
.card-play-btn:hover{background:rgba(20,184,166,.25);transform:scale(1.08)}
.card-play-btn.playing{background:var(--accent-cyan);color:#0F1520}
.card-play-btn.done{opacity:.4;border-color:#6B7280;color:#6B7280}
.card-progress{flex:1;height:3px;background:#1E293B;border-radius:2px;overflow:hidden}
.card-progress .fill{height:100%;background:var(--accent-cyan);border-radius:2px;transition:width .1s;width:0}
.card-status{font-size:11px;color:var(--text-secondary);font-family:var(--font-mono);white-space:nowrap;min-width:80px;text-align:right}

/* Now Playing */
#now-playing{position:fixed;bottom:0;left:0;right:0;z-index:1000;background:rgba(15,21,32,.97);border-top:1px solid var(--accent-cyan);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:12px 24px;display:none}
#now-playing .inner{max-width:820px;margin:0 auto;display:flex;align-items:center;gap:12px}
#now-playing .section-label{font-size:12px;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
#now-playing .section-label strong{color:#D1D5DB}
#now-playing .text-display{font-size:13px;color:var(--accent-cyan);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:300px;flex:2}
#now-playing .controls{display:flex;gap:6px;flex-shrink:0}

/* Footer */
.footer{text-align:center;padding:24px 0;border-top:1px solid var(--card-border);font-size:12px;color:var(--text-tertiary)}
.footer .disclaimer{margin-top:10px;padding:8px 16px;background:rgba(255,255,255,.03);border-radius:var(--radius-sm);font-size:11px;border:1px solid var(--card-border)}

/* Scroll indicator */

/* Floating Nav */
#navTab{position:fixed;left:0;top:50%;transform:translateY(-50%);z-index:999;width:26px;height:44px;background:rgba(17,24,39,.85);border:1px solid var(--card-border);border-left:none;border-radius:0 6px 6px 0;color:var(--text-secondary);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:left .25s,background .15s;backdrop-filter:blur(6px)}
#navTab:hover{background:rgba(20,184,166,.2);color:#14B8A6;left:0}
#navPanel{position:fixed;left:-280px;top:50%;transform:translateY(-50%);z-index:999;width:260px;max-height:80vh;background:rgba(15,21,32,.95);border:1px solid var(--card-border);border-radius:0 10px 10px 0;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:10px 0;overflow-y:auto;transition:left .25s ease;box-shadow:4px 0 20px rgba(0,0,0,.3)}
#navPanel.open{left:0}
#navPanel::-webkit-scrollbar{width:3px}
#navPanel::-webkit-scrollbar-thumb{background:rgba(20,184,166,.25);border-radius:2px}
.nav-close{position:absolute;top:6px;right:8px;background:none;border:none;color:var(--text-tertiary);font-size:16px;cursor:pointer;padding:2px 6px;line-height:1;border-radius:3px}
.nav-close:hover{color:#FFF;background:rgba(255,255,255,.06)}
.nav-cat{margin-bottom:2px}
.nav-cat-head{display:flex;align-items:center;gap:6px;padding:7px 12px;cursor:pointer;font-size:11px;font-weight:600;color:var(--text-secondary);border-bottom:1px solid rgba(255,255,255,.04);transition:color .15s;user-select:none}
.nav-cat-head:hover{color:#D1D5DB}
.nav-cat-head .arrow{font-size:8px;transition:transform .2s;color:var(--text-tertiary)}
.nav-cat-head .arrow.open{transform:rotate(90deg)}
.nav-cat-head .ccount{font-size:10px;color:var(--text-tertiary);margin-left:auto;font-family:var(--font-mono)}
.nav-item{display:flex;align-items:center;gap:6px;padding:5px 12px 5px 24px;cursor:pointer;font-size:11px;color:var(--text-secondary);transition:all .12s;border-left:2px solid transparent}
.nav-item:hover{background:rgba(255,255,255,.03);color:#D1D5DB}
.nav-item .num{font-family:var(--font-mono);font-size:9px;color:var(--text-tertiary);min-width:16px;text-align:right;opacity:.5}
.nav-item .title{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.nav-item .dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.nav-item.active{border-left-color:var(--accent-cyan);background:rgba(20,184,166,.07);color:#14B8A6}
.nav-item.active .num{color:#14B8A6;opacity:1}
.nav-item.done{opacity:.4}
.nav-item.done .title{text-decoration:line-through}
@media(max-width:640px){#navPanel{width:220px;left:-240px;max-height:70vh}#navPanel.open{left:0}}

#back-to-top{position:fixed;bottom:90px;right:20px;z-index:996;width:40px;height:40px;border-radius:50%;background:rgba(20,184,166,.85);border:1px solid rgba(20,184,166,.4);color:#FFF;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity .25s,visibility .25s,transform .25s,box-shadow .25s;box-shadow:0 4px 12px rgba(0,0,0,.4);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);user-select:none}
#back-to-top.show{opacity:1;visibility:visible}
#back-to-top:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(20,184,166,.3);background:rgba(20,184,166,1)}
#back-to-top:active{transform:translateY(-1px)}
@media(max-width:640px){#back-to-top{bottom:80px;right:14px;width:36px;height:36px;font-size:16px}}

@media(max-width:640px){
  .container{padding:20px 12px 100px}
  .card{padding:12px 14px}
  .global-controls{padding:10px 14px}
  #now-playing .text-display{display:none}
  #now-playing .section-label{flex:2}
}
</style>
</head>

trong>AI大模型的资本赛道上，头部玩家的资金壁垒越来越高，小型创业公司生存空间被挤压。普通用户可能面临AI服务价格上涨，但也将获得更强大的免费和付费AI工具。", "display_count": 3}, {"index": 3, "title": "ClickUp裁22%换3000AI", "tags": ["高", "AI", "媒体"], "sentences": [{"file": "sec004_sent000.mp3", "text": "ClickUp裁22%换3000AI↗。"}, {"file": "sec004_sent001.mp3", "text": "协作软件独角兽ClickUp裁员22%员工，但声称并非削减成本，而是用约3000个内部AI agent替代。"}, {"file": "sec004_sent002.mp3", "text": "CEO称目标是将公司打造成\"100倍组织\"，幸存员工将获得百万美元薪资级别。"}, {"file": "sec004_sent003.mp3", "text": "影响：AI替代白领工作不再是传说，以ClickUp为代表的\"AI优先\"企业裁员潮可能蔓延。"}, {"file": "sec004_sent004.mp3", "text": "Gartner调查显示约80%使用自主技术的公司已裁员，但财务回报并不明显。"}, {"file": "sec004_sent005.mp3", "text": "白领行业的技能重塑需求变得空前紧迫。"}], "impact_html": "<strong>影响：</strong>AI替代白领工作不再是传说，以ClickUp为代表的\"AI优先\"企业裁员潮可能蔓延。Gartner调查显示约80%使用自主技术的公司已裁员，但财务回报并不明显。白领行业的技能重塑需求变得空前紧迫。", "display_count": 3}, {"index": 4, "title": "特朗普召开伊朗问题终裁", "tags": ["高", "官方", "媒体"], "sentences": [{"file": "sec005_sent000.mp3", "text": "特朗普召开伊朗问题终裁↗。"}, {"file": "sec005_sent001.mp3", "text": "特朗普在白宫战情室召集高级顾问讨论伊朗协议\"最终定夺\"，但会议结束后未公布具体方案。"}, {"file": "sec005_sent002.mp3", "text": "框架协议此前已获美伊双方共识，但特朗普坚持伊朗必须放弃核武器、开放霍尔木兹海峡并销毁浓缩铀。"}, {"file": "sec005_sent003.mp3", "text": "影响：中东局势走向直接影响全球油价和航运成本，进而传导至国内成品油价格和物流成本。"}, {"file": "sec005_sent004.mp3", "text": "霍尔木兹海峡若持续封锁，进出口贸易和海淘成本都将上涨。"}], "impact_html": "<strong>影响：</strong>中东局势走向直接影响全球油价和航运成本，进而传导至国内成品油价格和物流成本。霍尔木兹海峡若持续封锁，进出口贸易和海淘成本都将上涨。", "display_count": 3}, {"index": 5, "title": "俄无人机击中罗马尼亚居民楼", "tags": ["高", "媒体"], "sentences": [{"file": "sec006_sent000.mp3", "text": "俄无人机击中罗马尼亚居民楼↗。"}, {"file": "sec006_sent001.mp3", "text": "一架俄罗斯无人机击中罗马尼亚边境城市加拉茨的居民楼，造成两人受伤、约70人被疏散。"}, {"file": "sec006_sent002.mp3", "text": "这是俄乌战争以来俄无人机首次在罗马尼亚造成人员受伤，北约和欧盟强烈谴责。"}, {"file": "sec006_sent003.mp3", "text": "影响：俄乌冲突外溢风险进一步上升。"}, {"file": "sec006_sent004.mp3", "text": "若北约因此加强东翼军事部署，可能加剧欧洲安全紧张局势。"}, {"file": "sec006_sent005.mp3", "text": "对中国普通人的直接影响有限，但可能推高全球避险情绪，影响国际航空和贸易路线。"}], "impact_html": "<strong>影响：</strong>俄乌冲突外溢风险进一步上升。若北约因此加强东翼 const AUDIO_BASE = 'tts_audio/';

let state = {
  currentSection: -1,
  currentSentence: -1,
  audio: null,
  isPlaying: false,
  isPaused: false,
  queue: [],
  queueIdx: 0,
  playAllActive: false,
  completedSections: new Set(),
};

const $ = id => document.getElementById(id);
const cardsContainer = $('cardsContainer');
const playAllBtn = $('playAllBtn');
const pauseAllBtn = $('pauseAllBtn');
const stopAllBtn = $('stopAllBtn');
const globalProgress = $('globalProgress');
const progressLabel = $('progressLabel');
const totalSections = $('totalSections');
const progressInfo = $('progressInfo');
const nowPlaying = $('now-playing');
const nowSection = $('nowSection');
const nowText = $('nowText');
const nowPauseBtn = $('nowPauseBtn');
const nowStopBtn = $('nowStopBtn');
const scrollIndicator = $('scrollIndicator');

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function tagClass(t) {
  if (t.includes('\u9ad8')) return 'red';
  if (t.includes('\u4e2d')) return 'yellow';
  if (t.includes('\u4f4e')) return 'green';
  if (t.includes('AI')) return 'ai';
  if (t.includes('\u5b98\u65b9')) return 'official';
  if (t.includes('\u5a92\u4f53')) return 'media';
  return 'green';
}

function render() {
  const catMap = [
    { name: '\u524d\u6cbf\u79d1\u6280', start: 0, end: 3 },
    { name: 'AI \u9886\u57df', start: 4, end: 7 },
    { name: '\u5168\u7403\u5c40\u52bf', start: 8, end: 12 },
    { name: '\u7ecf\u6d4e\u6c11\u751f', start: 13, end: 17 },
  ];
  let totalSent = 0;
  let html = '';
  for (const cat of catMap) {
    html += '<div class="cat-section"><div class="cat-heading">' + cat.name + '</div>';
    for (let i = cat.start; i <= cat.end; i++) {
      const sec = MANIFEST[i];
      if (!sec) continue;
      totalSent += (sec.display_count || sec.sentences.length);
      html += '<div class="card" id="card-' + i + '" data-sec="' + i + '">';
      html += '<div class="card-header">';
      html += '<div class="card-title">' + escHtml(sec.title) + '</div>';
      html += '<div class="tags">' + sec.tags.map(function(t) { return '<span class="tag ' + tagClass(t) + '">' + escHtml(t) + '</span>'; }).join('') + '</div>';
      html += '</div>';
      html += '<div class="card-body" id="body-' + i + '">';
      var disp = sec.display_count || sec.sentences.length;
      for (var j = 0; j < disp; j++) {
        html += '<span class="sent pending" data-sec="' + i + '" data-sent="' + j + '" id="sent-' + i + '-' + j + '">' + escHtml(sec.sentences[j].text) + '</span>';
      }
      html += '</div>';
      if (sec.impact_html) {
        html += '<div class="card-impact" id="impact-' + i + '">' + sec.impact_html + '</div>';
      }
      html += '<div class="card-controls">';
      html += '<button class="card-play-btn" id="playBtn-' + i + '" onclick="playSection(' + i + ')" title="\u6717\u8bfb\u672c\u8282">\u25b6</button>';
      html += '<div class="card-progress" id="prog-' + i + '"><div class="fill" id="progFill-' + i + '"></div></div>';
      html += '<span class="card-status" id="status-' + i + '">\u23f9 \u672a\u64ad\u653e</span>';
      html += '</div></div>';
    }
    html += '</div>';
  }
  cardsContainer.innerHTML = html;
  totalSections.textContent = MANIFEST.length;
  progressLabel.textContent = '0 / ' + totalSent;
}

function getAudioUrl(sec, sent) {
  return AUDIO_BASE + MANIFEST[sec].sentences[sent].file;
}

function playSection(secIdx) {
  stopAll();
  // Card border highlight + nav sync
  document.querySelectorAll('.card-reading').forEach(function(c){c.style.borderColor='';c.style.boxShadow='';c.classList.remove('card-reading');});
  document.querySelectorAll('.active-impact').forEach(function(c){c.classList.remove('active-impact');});
  document.querySelectorAll('.nav-item').forEach(function(it){it.classList.remove('active');});
  var cEl=document.getElementById('card-'+secIdx);
  if(cEl){cEl.classList.add('card-reading');cEl.style.borderColor='#14B8A6';cEl.style.boxShadow='0 0 0 1px #14B8A6, 0 0 20px rgba(20,184,166,.25)';}
  var ni=document.getElementById('nitem-'+secIdx);
  if(ni)ni.classList.add('active');
  state.currentSection = secIdx;
  state.currentSentence = 0;
  state.queue = MANIFEST[secIdx].sentences.map(function(s, j) { return { sec: secIdx, sent: j, file: s.file }; });
  state.queueIdx = 0;
  playQueue();
}

function playQueue() {
  if (state.queueIdx >= state.queue.length) {
    state.completedSections.add(state.currentSection);
    updateSectionUI(state.currentSection);
    updateGlobalProgress();
    nowPlaying.style.display = 'none';
    if (state.playAllActive) playNextSection();
    else { state.isPlaying = false; updateButtonStates(); }
    return;
  }
  var item = state.queue[state.queueIdx];
  var sec = item.sec, sent = item.sent;
  state.currentSentence = sent;
  highlightSentence(sec, sent);
  scrollToSentence(sec, sent);
  var url = getAudioUrl(sec, sent);
  state.audio = new Audio(url);
  state.isPlaying = true;
  state.isPaused = false;
  nowPlaying.style.display = 'block';
  nowSection.querySelector('strong').textContent = MANIFEST[sec].title.slice(0, 40);
  nowText.textContent = MANIFEST[sec].sentences[sent].text;
  nowPauseBtn.textContent = '\u23f8 \u6682\u505c';
  state.audio.onended = function() {
    var disp = MANIFEST[sec].display_count || MANIFEST[sec].sentences.length;
    var el = document.getElementById('sent-' + sec + '-' + sent);
    if (el) { el.classList.remove('active'); el.classList.add('done'); }
    // If this was the last display sentence, start highlighting card-impact
    if (sent + 1 >= disp && MANIFEST[sec].impact_html) {
      var impEl = document.getElementById('impact-' + sec);
      if (impEl) impEl.classList.add('active-impact');
    }
    updateSectionProgress(sec, sent + 1);
    updateGlobalProgress();
    state.queueIdx++;
    playQueue();
  };
  state.audio.onpause = function() { state.isPaused = true; nowPauseBtn.textContent = '\u25b6 \u7ee7\u7eed'; };
  state.audio.onplay = function() { state.isPaused = false; nowPauseBtn.textContent = '\u23f8 \u6682\u505c'; };
  state.audio.play().catch(function(e) {
    console.warn(e);
    state.queueIdx++;
    playQueue();
  });
  updateButtonStates();
}

function highlightSentence(sec, sent) {
  var sents = document.querySelectorAll('[data-sec="' + sec + '"]');
  sents.forEach(function(el) { el.classList.remove('active'); });
  var el = document.getElementById('sent-' + sec + '-' + sent);
  if (el) el.classList.add('active');
}

function scrollToSentence(sec, sent) {
  var el = document.getElementById('sent-' + sec + '-' + sent);
  if (!el) return;
  var rect = el.getBoundingClientRect();
  var viewH = window.innerHeight;
  if (rect.top < 100 || rect.bottom > viewH - 120) {
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

function updateSectionProgress(secIdx, doneCount) {
  var total = MANIFEST[secIdx].sentences.length;
  var pct = Math.min((doneCount / total) * 100, 100);
  var fill = document.getElementById('progFill-' + secIdx);
  var status = document.getElementById('status-' + secIdx);
  if (fill) fill.style.width = pct + '%';
  if (status) {
    if (doneCount >= total) status.textContent = '\u2705 \u5df2\u8bfb\u5b8c';
    else status.textContent = '\ud83d\udd0a ' + doneCount + '/' + total;
  }
}

function updateSectionUI(secIdx) {
  updateSectionProgress(secIdx, MANIFEST[secIdx].sentences.length);
}

function updateGlobalProgress() {
  var done = 0, total = 0;
  for (var k = 0; k < MANIFEST.length; k++) {
    total += MANIFEST[k].sentences.length;
    if (state.completedSections.has(MANIFEST[k].index)) done += MANIFEST[k].sentences.length;
  }
  var pct = total > 0 ? (done / total) * 100 : 0;
  globalProgress.style.width = pct + '%';
  progressLabel.textContent = done + ' / ' + total;
  progressInfo.textContent = '\u00b7 ' + Math.round(pct) + '% \u5df2\u8bfb';
  var scrollPct = window.scrollY / (document.documentElement.scrollHeight - window.innerHeight) * 100;
  scrollIndicator.style.width = Math.max(pct, scrollPct) + '%';
}

function playNextSection() {
  var next = -1;
  for (var i = state.currentSection + 1; i < MANIFEST.length; i++) {
    if (!state.completedSections.has(i)) { next = i; break; }
  }
  if (next >= 0) { playSection(next); }
  else {
    state.playAllActive = false; state.isPlaying = false; nowPlaying.style.display = 'none';
    updateButtonStates();
  }
}

function playAll() {
  stopAll();
  state.playAllActive = true;
  var first = 0;
  for (var i = 0; i < MANIFEST.length; i++) {
    if (!state.completedSections.has(i)) { first = i; break; }
  }
  playSection(first);
}

function pauseAll() {
  if (state.audio && state.isPlaying) {
    state.isPaused = true;
    state.audio.pause();
    updateButtonStates();
  }
}

function resumeAll() {
  if (state.audio && state.isPaused) {
    state.isPaused = false;
    state.audio.play();
    updateButtonStates();
  }
}

function stopAll() {
  if (state.audio) { state.audio.pause(); state.audio = null; }
  state.isPlaying = false; state.isPaused = false; state.playAllActive = false;
  state.queue = []; state.queueIdx = 0;
  document.querySelectorAll('.sent.active').forEach(function(el) { el.classList.remove('active'); });
  document.querySelectorAll('.card-reading').forEach(function(c){c.style.borderColor='';c.style.boxShadow='';c.classList.remove('card-reading');});
  document.querySelectorAll('.active-impact').forEach(function(c){c.classList.remove('active-impact');});
  nowPlaying.style.display = 'none';
  updateButtonStates();
}

function togglePause() {
  if (state.isPaused) resumeAll();
  else if (state.isPlaying) pauseAll();
}

function updateButtonStates() {
  pauseAllBtn.disabled = !state.isPlaying;
  stopAllBtn.disabled = !state.isPlaying;
  playAllBtn.disabled = state.isPlaying && state.playAllActive;
  if (state.isPlaying) {
    nowPauseBtn.textContent = state.isPaused ? '\u25b6 \u7ee7\u7eed' : '\u23f8 \u6682\u505c';
  }
}

playAllBtn.addEventListener('click', playAll);
pauseAllBtn.addEventListener('click', togglePause);
stopAllBtn.addEventListener('click', stopAll);
nowPauseBtn.addEventListener('click', togglePause);
nowStopBtn.addEventListener('click', stopAll);

document.addEventListener('scroll', function() {
  var pct = window.scrollY / (document.documentElement.scrollHeight - window.innerHeight) * 100;
  scrollIndicator.style.width = Math.max(pct, parseFloat(globalProgress.style.width || '0')) + '%';
  updateNav();
  var btt = document.getElementById('back-to-top');
  if (btt) btt.classList.toggle('show', window.scrollY > 400);
}, { passive: true });

document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === ' ') { e.preventDefault(); togglePause(); }
  if (e.key === 's' || e.key === 'S') stopAll();
});


// ─── Floating Nav ───
var navOpen = false;
var navCollapsed = {};
var navManualClick = false;

var NAV_CATS = [
  { name: '\u524d\u6cbf\u79d1\u6280', start: 0, end: 3 },
  { name: 'AI \u9886\u57df', start: 4, end: 7 },
  { name: '\u5168\u7403\u5c40\u52bf', start: 8, end: 12 },
  { name: '\u7ecf\u6d4e\u6c11\u751f', start: 13, end: 17 },
];

for (var ci = 0; ci < NAV_CATS.length; ci++) { navCollapsed[ci] = false; }

function renderNav() {
  var list = document.getElementById('navList');
  if (!list) return;
  var html = '';
  for (var ci = 0; ci < NAV_CATS.length; ci++) {
    var cat = NAV_CATS[ci];
    var collapsed = navCollapsed[ci];
    var cnt = 0;
    for (var i = cat.start; i <= cat.end; i++) { if (MANIFEST[i]) cnt++; }
    html += '<div class="nav-cat">';
    html += '<div class="nav-cat-head" onclick="toggleCat(' + ci + ')">';
    html += '<span class="arrow ' + (collapsed ? '' : 'open') + '">\u25b6</span>';
    html += cat.name;
    html += '<span class="ccount">' + cnt + '</span></div>';
    html += '<div id="navCat-' + ci + '" style="' + (collapsed ? 'display:none' : '') + '">';
    for (var i = cat.start; i <= cat.end; i++) {
      var sec = MANIFEST[i];
      if (!sec) continue;
      var short = sec.title.length > 16 ? sec.title.slice(0, 16) + '\u2026' : sec.title;
      var dotColor = '#10B981';
      if (sec.tags && sec.tags.length) {
        var t = sec.tags[0];
        if (t.includes('\u9ad8')) dotColor = '#EF4444';
        else if (t.includes('\u4e2d')) dotColor = '#F59E0B';
      }
      html += '<div class="nav-item" id="nitem-' + i + '" onclick="goToSection(' + i + ')">';
      html += '<span class="num">' + (i+1) + '</span>';
      html += '<span class="title">' + escHtml(short) + '</span>';
      html += '<span class="dot" style="background:' + dotColor + '"></span></div>';
    }
    html += '</div></div>';
  }
  list.innerHTML = html;
}

function toggleNav() {
  navOpen = !navOpen;
  document.getElementById('navPanel').classList.toggle('open', navOpen);
}

function toggleCat(ci) {
  navCollapsed[ci] = !navCollapsed[ci];
  var el = document.getElementById('navCat-' + ci);
  if (el) el.style.display = navCollapsed[ci] ? 'none' : '';
  var heads = document.querySelectorAll('.nav-cat-head');
  if (heads[ci]) {
    var arrow = heads[ci].querySelector('.arrow');
    if (arrow) arrow.classList.toggle('open', !navCollapsed[ci]);
  }
}

function goToSection(idx) {
  navManualClick = true;
  setTimeout(function() { navManualClick = false; }, 2000);
  
  // Nav highlight (immediate)
  document.querySelectorAll('.nav-item').forEach(function(it){it.classList.remove('active');});
  var ni = document.getElementById('nitem-' + idx);
  if(ni)ni.classList.add('active');
  if (ni) ni.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  
  // Scroll to card
  var el = document.getElementById('card-' + idx);
  if (el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    // Card border highlight
    document.querySelectorAll('.card-reading').forEach(function(c){
      c.style.borderColor='';c.style.boxShadow='';c.classList.remove('card-reading');
    });
    document.querySelectorAll('.active-impact').forEach(function(c){c.classList.remove('active-impact');});
    el.classList.add('card-reading');
    el.style.borderColor='#14B8A6';
    el.style.boxShadow='0 0 0 1px #14B8A6, 0 0 20px rgba(20,184,166,.25)';
  }
  // Auto-close on mobile
  if (window.innerWidth < 640) {
    navOpen = false;
    document.getElementById('navPanel').classList.remove('open');
  }
}

function updateNav() {
  if (navManualClick) return;
  var bestIdx = -1, bestDist = Infinity;
  for (var i = 0; i < MANIFEST.length; i++) {
    var el = document.getElementById('card-' + i);
    if (!el) continue;
    var rect = el.getBoundingClientRect();
    var dist = Math.abs(rect.top);
    if (rect.top < 0) dist = dist * 0.5;
    if (dist < bestDist) { bestDist = dist; bestIdx = i; }
  }
  document.querySelectorAll('.nav-item').forEach(function(item) { item.classList.remove('active'); });
  var active = document.getElementById('nitem-' + bestIdx);
  if (active) active.classList.add('active');
  for (var i = 0; i < MANIFEST.length; i++) {
    var item = document.getElementById('nitem-' + i);
    if (item) {
      if (state.completedSections.has(i)) item.classList.add('done');
      else item.classList.remove('done');
    }
  }
}

renderNav();
render();
updateButtonStates();
</script>
