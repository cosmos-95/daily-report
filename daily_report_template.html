<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全球要闻日报 | {date}</title>
<meta name="description" content="{summary}">
<meta name="report-stats" content="high:{high_count},mid:{mid_count},low:{low_count}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Noto+Serif+SC:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-top: #0F1520; --bg-mid: #0B0F1A; --bg-bottom: #0A0E17;
  --card-bg: #111827;
  --card-border: rgba(255,255,255,0.06);
  --card-border-hover: rgba(255,255,255,0.10);
  --text-primary: #E5E7EB; --text-secondary: #9CA3AF; --text-tertiary: #6B7280;
  --accent-blue: #3B82F6; --accent-cyan: #14B8A6; --accent-green: #10B981;
  --accent-amber: #F59E0B; --accent-red: #EF4444; --source-green: #059669;
  --bg-info: #1E3A8A; --bg-success: #064E3B; --bg-warning: #78350F; --bg-danger: #7F1D1D;
  --radius-sm: 6px; --radius-md: 10px; --radius-lg: 14px; --radius-full: 999px;
  --font-body: "IBM Plex Sans", ui-sans-serif, system-ui, -apple-system, sans-serif;
  --font-mono: "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
  --font-display: "Noto Serif SC", ui-serif, Georgia, serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:var(--font-body);
  background:linear-gradient(180deg,var(--bg-top) 0%,var(--bg-mid) 50%,var(--bg-bottom) 100%);
  color:var(--text-primary);line-height:1.6;min-height:100vh;
}
.container{max-width:780px;margin:0 auto;padding:48px 24px}
.header{text-align:center;padding:20px 0 36px;margin-bottom:32px;border-bottom:1px solid var(--card-border)}
.header h1{font-family:var(--font-display);font-size:30px;font-weight:700;color:#FFF;margin-bottom:4px}
.header .sub{font-size:13px;color:var(--text-secondary);font-weight:400;letter-spacing:.8px}
.header .date-badge{display:inline-block;margin-top:18px;padding:6px 16px;background:var(--bg-info);border:1px solid #2563EB;border-radius:var(--radius-full);font-size:13px;font-weight:500;color:var(--accent-blue)}
.date-separator{text-align:center;margin:36px 0 24px}
.date-separator span{display:inline-block;padding:4px 16px;background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius-full);font-size:12px;color:var(--text-tertiary);font-family:var(--font-mono)}
.stats-row{display:flex;gap:12px;margin-bottom:32px}
.stat-card{flex:1;background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius-md);padding:20px 18px;text-align:center;box-shadow:0 4px 6px -1px rgba(0,0,0,.3),0 2px 4px -1px rgba(0,0,0,.2);transition:box-shadow .2s,transform .2s,border-color .2s}
.stat-card:hover{box-shadow:0 10px 15px -3px rgba(0,0,0,.5);transform:translateY(-1px);border-color:var(--card-border-hover)}
.stat-card .num{font-family:var(--font-mono);font-size:32px;font-weight:500;margin-bottom:2px;line-height:1}
.stat-card .label{font-size:11px;color:var(--text-secondary);font-weight:500;letter-spacing:.3px;text-transform:uppercase}
.stat-card.red .num{color:var(--accent-red)}.stat-card.yellow .num{color:var(--accent-amber)}.stat-card.green .num{color:var(--accent-green)}
.cat-section{margin-bottom:36px}
.cat-heading{font-family:var(--font-display);font-size:17px;font-weight:700;color:#D1D5DB;padding:10px 0 10px 14px;border-left:3px solid var(--accent-cyan);border-bottom:1px solid var(--card-border);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.cat-heading .icon{font-size:16px}
.card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius-md);padding:20px 22px;margin-bottom:14px;box-shadow:0 4px 6px -1px rgba(0,0,0,.2),0 2px 4px -1px rgba(0,0,0,.15);transition:border-color .2s,box-shadow .2s}
.card:hover{border-color:var(--card-border-hover);box-shadow:0 10px 15px -3px rgba(0,0,0,.4)}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px}
.card-title{font-size:15px;font-weight:600;line-height:1.5;color:#D1D5DB;flex:1}
.tags{display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap}
.tag{font-size:12px;padding:3px 10px;border-radius:var(--radius-full);font-weight:500;letter-spacing:.2px;border:1px solid transparent}
.tag.red{background:var(--bg-danger);color:#F87171;border-color:#DC2626}.tag.yellow{background:var(--bg-warning);color:var(--accent-amber);border-color:#D97706}.tag.green{background:var(--bg-success);color:var(--accent-green);border-color:#059669}.tag.ai{background:var(--bg-info);color:var(--accent-blue);border-color:#2563EB}
.card-summary{font-size:13px;color:var(--text-secondary);margin-bottom:12px;line-height:1.6}
.card-impact{background:#1E293B;border-radius:var(--radius-sm);padding:12px 16px;font-size:13px;color:#A7B8D0;border-left:3px solid var(--accent-cyan);position:relative}
.card-impact::before{content:"AI";position:absolute;top:-8px;left:-10px;background:var(--accent-cyan);color:#0B0F1A;font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;letter-spacing:.5px}
.card-impact strong{color:#A7F3D0;font-weight:600}
.source-line{margin-top:14px;font-size:11px;display:flex;gap:10px;flex-wrap:wrap}
.source-line span{padding:2px 8px;color:var(--source-green);border:1px solid rgba(5,150,105,.2);border-radius:var(--radius-sm);font-family:var(--font-mono);font-size:10px;cursor:pointer;transition:border-color .2s}
.source-line span:hover{border-color:var(--source-green);text-decoration:underline}
.footer{text-align:center;padding:28px 0;margin-top:36px;border-top:1px solid var(--card-border);font-size:12px;color:var(--text-tertiary)}
.footer p{margin:4px 0;line-height:1.5}
.footer .disclaimer{margin-top:12px;padding:10px 18px;background:rgba(255,255,255,.03);border-radius:var(--radius-sm);font-size:11px;color:var(--text-tertiary);border:1px solid var(--card-border)}
@media(max-width:640px){.container{padding:32px 16px}.stats-row{gap:8px}.stat-card{padding:14px 10px}.stat-card .num{font-size:26px}.card{padding:16px 18px}.card-header{flex-direction:column;gap:8px}.header h1{font-size:24px}.cat-heading{padding-left:10px;border-left-width:2px}}
@media(max-width:480px){.container{padding:24px 12px}.stats-row{gap:6px}.stat-card{padding:12px 8px}.stat-card .num{font-size:22px}.header h1{font-size:20px}}
</style>
</head>
<body>
<div class="container">
<div class="header"><h1>全球要闻日报</h1><div class="sub">覆盖全球 · 聚焦AI · 交叉验证 · 白话解读</div><div class="date-badge">{formatted_date}</div></div>
<div class="stats-row">
<div class="stat-card red"><div class="num">{high_count}</div><div class="label">高影响力事件</div></div>
<div class="stat-card yellow"><div class="num">{mid_count}</div><div class="label">中影响力事件</div></div>
<div class="stat-card green"><div class="num">{low_count}</div><div class="label">低影响力事件</div></div>
</div>
{content}
<div class="footer"><p>全球要闻日报 · 自动生成于 {date}</p><p>影响力评级基于对中国普通个人的直接/间接触及程度</p><div class="disclaimer">本报告由 AI 自动聚合生成，信息仅供参考，不构成任何投资或行动建议。</div></div>
</div>
</body>
</html>
